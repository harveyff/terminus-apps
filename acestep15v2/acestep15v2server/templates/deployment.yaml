---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acestepv2
  namespace: {{ .Release.Namespace }}
  labels:
    app: multi-port
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multi-port
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: multi-port
    spec:
      containers:
        - name: acestep
          image: "docker.io/harveyff/acestep15:v2.0.2"
          ports:
            - containerPort: 7860
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              # Olares: download Job and main Pod start together — wait for done markers.
              DONE_MAIN="/app/checkpoints/.Ace-Step1.5.done"
              DONE_4B="/app/checkpoints/acestep-5Hz-lm-4B/.acestep-5Hz-lm-4B.done"
              while [ ! -f "$DONE_MAIN" ]; do
                echo "[wait] missing .Ace-Step1.5.done, sleep 10s"
                sleep 10
              done
              if [ "${ACESTEP_LM_MODEL_PATH:-}" = "acestep-5Hz-lm-4B" ]; then
                while [ ! -f "$DONE_4B" ]; do
                  echo "[wait] missing 4B LM .done, sleep 10s"
                  sleep 10
                done
              fi
              # HAMI often injects empty/zero limit; nano-vllm and tooling expect a sane value.
              case "${CUDA_DEVICE_MEMORY_LIMIT_0:-}" in
                ""|0|0m|0M)
                  export CUDA_DEVICE_MEMORY_LIMIT_0="${ACESTEP_CUDA_DEVICE_MEMORY_LIMIT_0:-24576m}"
                  ;;
              esac
              # Image ships /app/docker-entrypoint-cuda.sh (Gradio args from env: ACESTEP_* , GRADIO_*).
              exec /app/docker-entrypoint-cuda.sh
          env:
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: TZ
              value: "Etc/UTC"
            - name: HF_ENDPOINT
              value: "{{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_SERVICE }}"
            - name: ACESTEP_INIT_SERVICE
              value: "true"
            - name: ACESTEP_INIT_LLM
              value: "true"
            - name: ACESTEP_CONFIG_PATH
              value: "acestep-v15-turbo"
            - name: ACESTEP_LM_MODEL_PATH
              value: "acestep-5Hz-lm-4B"
            - name: ACESTEP_LM_BACKEND
              value: "vllm"
            - name: ACESTEP_DEVICE
              value: "auto"
            - name: ACESTEP_EXTRA_ARGS
              value: "--language en"
            - name: TOKENIZERS_PARALLELISM
              value: "false"
            - name: ACESTEP_CUDA_DEVICE_MEMORY_LIMIT_0
              value: "24576m"
          envFrom:
            - configMapRef:
                name: acestep-config
          resources:
            requests:
              cpu: "500m"
              memory: 12Gi
            limits:
              cpu: "5"
              memory: 32Gi
          volumeMounts:
            - name: checkpoints
              mountPath: /app/checkpoints
            - name: outputs
              mountPath: /app/gradio_outputs
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: checkpoints
          hostPath:
            path: "{{ .Values.sharedlib }}/ai/acestep15v2"
            type: DirectoryOrCreate
        - name: outputs
          hostPath:
            path: "{{ .Values.userspace.userData }}/AI/output/acestep15v2"
            type: DirectoryOrCreate
        - name: logs
          hostPath:
            path: "{{ .Values.userspace.appData }}/logs"
            type: DirectoryOrCreate
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-download-models
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-download-models
spec:
  ttlSecondsAfterFinished: 100
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-download-models
    spec:
      restartPolicy: OnFailure
      containers:
        - name: download-model
          image: "docker.io/beclab/harveyff-hf-downloader-only:v0.0.6"
          env:
            - name: HF_ENDPOINT
              value: "{{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_SERVICE }}"
            - name: HF_TOKEN
              value: "{{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_TOKEN }}"
          args:
            - "--tasks"
            - '{"tasks":[{"repo":"ACE-Step/Ace-Step1.5","file":"","ref":"main","outDir":"/app/checkpoints","doneNameTpl":".Ace-Step1.5.done"},{"repo":"ACE-Step/acestep-5Hz-lm-4B","file":"","ref":"main","outDir":"/app/checkpoints/acestep-5Hz-lm-4B","doneNameTpl":".acestep-5Hz-lm-4B.done"}]}'
            - "--static"
            - "/app/static"
            - "--port"
            - "8090"
            - "--probe-url"
            - "/gradio_api/info"
          ports:
            - containerPort: 8090
              name: http
          volumeMounts:
            - name: checkpoints
              mountPath: /app/checkpoints
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              cpu: "1"
              memory: 1Gi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      volumes:
        - name: checkpoints
          hostPath:
            path: "{{ .Values.sharedlib }}/ai/acestep15v2"
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: download-svc
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Release.Name }}-download-models
  ports:
    - name: download-status
      port: 8090
      targetPort: 8090
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: acestep-svc
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: multi-port
  ports:
    - name: main-api
      port: 7860
      targetPort: 7860
  type: ClusterIP