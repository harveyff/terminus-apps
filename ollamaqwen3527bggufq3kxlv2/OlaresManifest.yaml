---
olaresManifest.version: '0.11.0'
olaresManifest.type: app
apiVersion: 'v2'
metadata:
  name: ollamaqwen3527bggufq3kxlv2
  icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/qwen3-14b.png
  description: Run Qwen3.5-27B (Q3_K_XL quantization) locally via Ollama.
  appid: ollamaqwen3527bggufq3kxlv2
  title: Qwen3.5 27B GGUF Q3_K_XL (Ollama)
  version: '1.0.0'
  categories:
    - AI
sharedEntrances:
  - name: ollamaqwen3527bggufq3kxlv2
    host: sharedentrances-api
    port: 0
    title: Qwen3.5 27B GGUF Q3_K_XL
    invisible: true
    authLevel: internal
    icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/qwen3-14b.png
entrances:
  - name: ollamaclient
    port: 8080
    host: ollamaclient
    title: Qwen3.5 27B GGUF Q3_K_XL
    icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/qwen3-14b.png
    openMethod: window
    authLevel: internal
spec:
  versionName: 'Qwen3.5-27B-UD-Q3_K_XL'
  fullDescription: |
    ## IMPORTANT NOTE ##
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## MODEL ##
    Qwen3.5-27B is a dense model from the Qwen3.5 series by Alibaba with 27.8B parameters. It uses the Efficient Hybrid Architecture (Gated Delta Networks) for high-throughput inference. Qwen3.5 integrates breakthroughs in multimodal learning, architectural efficiency, and reinforcement learning to empower developers and enterprises with unprecedented capability.

    - Model: Qwen3.5-27B-UD-Q3_K_XL
    - Source: unsloth/Qwen3.5-27B-GGUF (Hugging Face)
    - Quantization: Q3_K_XL (Unsloth Dynamic)
    - Context: 128000
    - Backend: Ollama

  developer: Alibaba
  website: https://qwen.ai/home
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  license:
    - text: Apache-2.0
      url: https://huggingface.co/unsloth/Qwen3.5-27B-GGUF

  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  limitedCpu: 6200m
  requiredCpu: 150m
  requiredDisk: 50Mi
  limitedDisk: 500Gi
  limitedMemory: 40Gi
  requiredMemory: 4200Mi
  requiredGpu: 20
  limitedGpu: 26Gi
  {{- else }}
  requiredMemory: 64Mi
  limitedMemory: 800Mi
  requiredDisk: 50Mi
  limitedDisk: 200Mi
  requiredCpu: 10m
  limitedCpu: 800m
  {{- end }}

  supportArch:
    - amd64
    - arm64
  subCharts:
  - name: ollamaqwen3527bggufq3kxlv2server
    shared: true
  - name: ollamaqwen3527bggufq3kxlv2
permission:
  appData: true
  appCache: true
  userData:
    - Home/Ollama
options:
  apiTimeout: 0
  appScope:
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
    clusterScoped: true
    appRef:
      - ollamaqwen3527bggufq3kxlv2
  {{- else }}
    clusterScoped: false
  {{- end }}
  dependencies:
    - name: olares
      version: '>=1.12.3-0'
      type: system
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  {{- else }}
    - name: ollamaqwen3527bggufq3kxlv2
      type: application
      version: '>=1.0.0'
      mandatory: true
  {{- end }}
{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
envs:
  - envName: OLARES_USER_HUGGINGFACE_TOKEN
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_TOKEN
  - envName: OLARES_USER_HUGGINGFACE_SERVICE
    required: true
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_SERVICE
  - envName: KEEP_ALIVE
    required: false
    type: bool
    editable: true
    applyOnChange: true
    default: "false"
{{- end }}
