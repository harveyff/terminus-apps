metadata:
  title: Qwen3.5 27B GGUF Q3_K_XL (Ollama)
  description: 通过 Ollama 本地运行 Qwen3.5-27B（Q3_K_XL 量化）。

spec:
  fullDescription: |
    ## 使用须知 ##
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序来调用它。

    ## 模型 ##
    Qwen3.5-27B 是阿里巴巴 Qwen3.5 系列的稠密模型，总参数 27.8B，使用高效混合架构（门控 Delta 网络），实现高吞吐推理。Qwen3.5 集成了多模态学习、架构效率和强化学习方面的突破，为开发者和企业提供前所未有的能力。

    - 模型：Qwen3.5-27B-UD-Q3_K_XL
    - 来源：unsloth/Qwen3.5-27B-GGUF（Hugging Face）
    - 量化：Q3_K_XL（Unsloth Dynamic）
    - 上下文：128000
    - 后端：Ollama
