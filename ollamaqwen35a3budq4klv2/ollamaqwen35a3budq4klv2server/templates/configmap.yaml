{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
{{- $hfService := .Values.olaresEnv.OLARES_USER_HUGGINGFACE_SERVICE | default "https://huggingface.co" }}
{{- $hfEndpoint := $hfService | trimSuffix "/" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-env
  namespace: "{{ .Release.Namespace }}"
data:
  PGID: "1000"
  PUID: "1000"
  TZ: "Etc/UTC"
  GGML_CUDA_DISABLE_GRAPHS: "1"
  OLLAMA_ORIGINS: "*"
  OLLAMA_DEBUG: "1"
  MODEL_NAME: "qwen35a3b-q4kl"
  HF_REPO: "unsloth/Qwen3.5-35B-A3B-GGUF"
  HF_FILE: "Qwen3.5-35B-A3B-UD-Q4_K_L.gguf"
  HF_ENDPOINT: "{{ $hfEndpoint }}"
  GGUF_DIR: "/models"
  GGUF_PARAMS: '{"num_ctx": 128000, "stop": ["<|im_end|>", "<|endoftext|>"]}'
  GGUF_TEMPLATE_NAME: "chatml"
  OLLAMA_CONTEXT_LENGTH: "128000"
  OLLAMA_NUM_PARALLEL: "1"
  OLLAMA_FLASH_ATTENTION: "1"
  OLLAMA_KV_CACHE_TYPE: "q8_0"
  MODELFILE_B64: ""
{{- end }}
